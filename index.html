<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>つぶやきメモ</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }
    html {
      overflow-y: scroll;
      font-size: 100%;
      scroll-behavior: smooth;
      
    }
    :root {
      --bg-body: #faf8f5;
      --bg-container: #ffffff;
      --bg-search: #f4efe9;
      --border-color: #e6e0d8;
      --text-main: #2b2826;
      --text-sub: #5c554e;
      --accent: #c2410c;
      --accent-hover: #a83506;
    }
    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Noto Sans JP", "Meiryo", sans-serif;
      background: var(--bg-body);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      color: var(--text-main);
    }
    .container {
      width: 100%;
      max-width: 680px;
      background: var(--bg-container);
      border: 1px solid var(--border-color);
      border-radius: 12px;
    }

    /* ボタン設定 */
    .btn {
      padding: 6px 14px;
      font-size: 0.875rem;
      font-weight: bold;
      border-radius: 9999px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: background-color 0.2s, opacity 0.2s;
      white-space: nowrap;
    }
    .btn:focus-visible, .action-btn:focus-visible, .sort-select:focus-visible, .tab:focus-visible {
      outline: 2px solid var(--text-main);
      outline-offset: 2px;
    }
    .btn-primary {
      background: var(--accent);
      color: var(--bg-container);
    }
    .btn-primary:hover {
      background: var(--accent-hover);
    }
    .btn-primary:disabled {
      background: var(--accent);
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-sub {
      background: var(--bg-search);
      color: var(--text-main);
      border: 1px solid var(--border-color);
    }
    .btn-sub:hover {
      background: var(--border-color);
    }
    .btn-mini {
      padding: 4px 10px;
      font-size: 0.875rem;
    }
    .btn-delete-selected {
      padding: 2px 10px;
      font-size: 0.875rem;
    }
    
    /* トップバー */
    .top-bar {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .top-bar-title-wrapper {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }
    .top-bar-title {
      font-size: 1.125rem;
      font-weight: bold;
      margin: 0;
    }
    .tweet-total-count {
      font-size: 0.875rem;
      color: var(--text-sub);
    }
    .top-bar-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .top-bar-actions .btn-sub{
      text-decoration: none;
      background: none;
      border: none;
    }
    .top-bar-actions .btn-sub:hover{
      color: var(--accent-hover)
    }

    /* 入力エリア */
    .input-area {
      padding: 16px;
      border-bottom: 6px solid var(--border-color);
    }
    textarea {
      width: 100%;
      border: 1px solid transparent;
      outline: none;
      font-size: 1rem;
      font-family: inherit;
      resize: none;
      min-height: 60px;
      field-sizing: content;
      max-height: 30vh;
      background: transparent;
      color: var(--text-main);
      line-height: 1.6;
    }
    textarea:focus-visible {
      border-radius: 4px;
      box-shadow: 0 0 0 2px var(--accent);
    }
    .input-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
    }
    .char-count {
      font-size: 0.875rem;
      color: var(--text-sub);
    }
    .char-count.over {
      color: var(--accent);
      font-weight: bold;
    }
    
    /* 検索欄 */
    .control-area {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
    }
    .search-input {
      width: 100%;
      padding: 8px 16px;
      border-radius: 9999px;
      background: var(--bg-search);
      color: var(--text-main);
      font-size: 0.9375rem;
      border: 2px solid transparent;
      outline: none;
    }
    .search-input:focus-visible {
      border-color: var(--accent);
      background: var(--bg-container);
    }
    .search-input::-webkit-search-cancel-button{
      cursor: pointer;
    }
    
    /* タブ */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border-color);
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 12px 0;
      font-size: 0.9375rem;
      font-weight: bold;
      color: var(--text-sub);
      cursor: pointer;
      white-space: nowrap;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      font-family: inherit;
    }
    .tab[aria-selected="true"] {
      color: var(--text-main);
      border-bottom-color: var(--accent);
    }
    .tab[aria-selected="false"]:hover{
      color: var(--accent-hover);
    }
    
    /* チップ・一覧エリア */
    .list-view-area {
      padding: 12px;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-body);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .list-item-chip {
      padding: 6px 12px;
      background: var(--bg-container);
      border: 1px solid var(--border-color);
      border-radius: 9999px;
      cursor: pointer;
      font-size: 0.875rem;
      color: var(--text-main);
      font-family: inherit;
    }
    .list-item-chip[aria-pressed="true"] {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg-container);
      font-weight: bold;
    }
    .list-view-empty {
      color: var(--text-sub);
      font-size: 0.875rem;
      padding: 5px;
    }
    
    /* タイムライン操作バー */
    .timeline-action-bar {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-body);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.875rem;
      gap: 10px;
    }
    .action-bar-left {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .select-all-label {
      cursor: pointer;
      white-space: nowrap;
    }
    input[type="checkbox"]{
      cursor: pointer;
    }
    .sort-select {
      padding: 4px 8px;
      border-radius: 6px;
      background: var(--bg-container);
      color: var(--text-main);
      border: 1px solid var(--border-color);
      font-size: 0.875rem;
      cursor: pointer;
    }
    .month-select {
      width: 100%;
      max-width: 300px;
      padding: 6px 12px;
    }
    .hidden-label {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }

    /* つぶやき本体 */
    .tweet {
      padding: 16px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      gap: 12px;
    }
    .tweet.is-reply {
      border-left: 3px solid var(--accent);
      padding-left: 13px;
    }
    .tweet-checkbox-wrapper {
      display: flex;
      align-items: flex-start;
      padding-top: 2px;
    }
    .tweet-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .tweet-header {
      font-size: 0.875rem;
      color: var(--text-sub);
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
    }
    .reply-badge {
      color: var(--accent);
      font-weight: bold;
    }
    
    .tweet-text {
      font-size: 1rem;
      color: var(--text-main);
      white-space: pre-wrap;
      word-break: break-all;
      margin: 0;
      line-height: 1.6;
    }
    
    .tweet-body-container.collapsed .tweet-text {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 5;
      line-clamp: 5;
      max-height: 8em;
      overflow: hidden;
    }
    
    .tweet-text a, .hashtag {
      color: var(--accent);
      text-decoration: none;
      cursor:pointer;
    }
    .tweet-text a:hover, .hashtag:hover {
      text-decoration: underline;
    }
    
    /* 会話スレッドボックス */
    .conversation-thread-box {
      margin: 4px 0 12px 6px;
      border-left: 2px solid var(--border-color);
      padding-left: 14px;
      display: none;
    }
    .parent-preview-node {
      padding: 4px 0 8px 0;
    }
    .parent-preview-date {
      font-size: 0.875rem;
      color: var(--text-sub);
      margin-bottom: 2px;
    }
    .parent-preview-date a, .tweet-header a{
      color: var(--text-sub);
      text-decoration: none;
    }
    .parent-preview-date a:hover, .tweet-header a:hover{
      color: var(--accent-hover);
      text-decoration: underline;
    }
    .parent-preview-text {
      margin: 0;
      color: var(--text-main);
      font-size: 1rem;
      line-height: 1.6;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 4;
      line-clamp: 4;
      max-height: 6.4em;
      overflow: hidden;
    }
    .show-parent-btn {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: bold;
      padding: 0;
      text-align: left;
      font-family: inherit;
    }

    /* フッターアクション */
    .tweet-footer {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .action-btn {
      background: none;
      border: none;
      font-size: 0.875rem;
      color: var(--text-sub);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      white-space: nowrap;
      font-family: inherit;
      border-radius: 4px;
    }
    .action-btn.like-btn.active {
      color: var(--accent);
    }
    .action-btn:hover {
      color: var(--accent-hover);
    }
    
    .more-btn {
      align-self: flex-start;
      background: none;
      border: none;
      color: var(--accent);
      font-size: 0.875rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 6px;
      padding: 0;
      font-family: inherit;
    }
    .no-tweet, .select-prompt {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-sub);
      font-size: 0.9375rem;
    }

    /* インライン入力エリア */
    .inline-form-area {
      margin-top: 12px;
      padding: 12px;
      background: var(--bg-search);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      width: 100%;
    }
    .inline-form-title {
      font-size: 0.875rem;
      font-weight: bold;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .inline-form-area textarea {
      background: var(--bg-container);
      padding: 8px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-size: 0.9375rem;
      width: 100%;
    }
    .inline-form-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
    }
    
    #importFile {
      display: none;
    }

    @media (max-width: 600px) {
      body {
        padding: 8px;
      }
      .container {
        border-radius: 8px;
      }
      .top-bar {
        padding: 10px 12px;
      }
      .top-bar-title {
        font-size: 1rem;
      }
      .input-area, .control-area, .tweet {
        padding: 12px;
      }
      .tabs .tab {
        font-size: 0.875rem;
        padding: 10px 0;
      }
      .timeline-action-bar {
        flex-direction: column;
        align-items: flex-start;
        padding: 10px 12px;
      }
      .sort-select {
        width: 100%;
      }
      .tweet-footer {
        gap: 12px;
        justify-content: space-between;
      }
      .action-btn {
        font-size: 0.875rem;
        padding: 6px 2px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <header class="top-bar">
    <div class="top-bar-title-wrapper">
      <h1 class="top-bar-title">つぶやきメモ</h1>
      <span id="tweetTotalCount" class="tweet-total-count" aria-live="polite"></span>
    </div>
    <div class="top-bar-actions">
      <a class="btn btn-sub" href="https://github.com/mizusameblue/リポジトリ名" target="_blank">使い方</a>
      <button class="btn btn-sub" onclick="document.getElementById('importFile').click();">インポート</button>
      <button class="btn btn-sub" onclick="exportJSON()">エクスポート</button>
      <input type="file" id="importFile" accept=".json" onchange="importJSON(event)" aria-label="JSONデータをインポート">
    </div>
  </header>

  <main>
    <div class="input-area">
      <textarea id="tweetInput" placeholder="いまどうしてる？" oninput="handleInput()" aria-label="新規つぶやき入力欄"></textarea>
      <div class="input-footer">
        <div id="charCount" class="char-count" aria-live="polite">0 / 10,000</div>
        <button id="postBtn" class="btn btn-primary" onclick="postTweet()" disabled>つぶやく</button>
      </div>
    </div>

    <div class="control-area">
      <input type="search" id="searchInput" class="search-input" placeholder="キーワード・#タグ検索..." oninput="loadTweets()" aria-label="つぶやきを検索">
    </div>

    <div class="tabs" role="tablist" aria-label="タイムラインの切り替え">
      <button id="tabAll" class="tab" role="tab" aria-selected="true" aria-controls="timeline" onclick="switchTab('all')">すべて</button>
      <button id="tabLike" class="tab" role="tab" aria-selected="false" aria-controls="timeline" onclick="switchTab('like')">いいね</button>
      <button id="tabTag" class="tab" role="tab" aria-selected="false" aria-controls="timeline" onclick="switchTab('tag')">タグ</button>
      <button id="tabMonth" class="tab" role="tab" aria-selected="false" aria-controls="timeline" onclick="switchTab('month')">月別</button>
    </div>

    <div id="listViewArea" class="list-view-area" style="display: none;" role="toolbar" aria-label="フィルターオプション"></div>

    <div id="timelineActionBar" class="timeline-action-bar">
      <div class="action-bar-left">
        <label class="select-all-label"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"> すべて選択</label>
        <button class="btn btn-mini btn-primary btn-delete-selected" onclick="deleteSelected()" disabled>選択削除</button>
      </div>
      <div>
        <label for="sortOrder" class="hidden-label">並び替え順</label>
        <select id="sortOrder" onchange="toggleSort()" class="sort-select">
          <option value="desc">新しい順</option>
          <option value="asc">古い順</option>
        </select>
      </div>
    </div>

    <div id="timeline" role="region" aria-live="polite" aria-label="タイムライン"></div>
  </main>
</div>

<script>
  let currentViewMode = 'all';
  let sortOrder = 'desc';
  let selectedMonth = null;
  let selectedTag = null;
  const MAX_CHARS = 1000;

  const dateFormat = new Intl.DateTimeFormat('ja-JP', {
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit'
  });

  window.onload = function() {
    const savedText = localStorage.getItem("draft_tweet");
    if (savedText) document.getElementById("tweetInput").value = savedText;
    handleInput();
    loadTweets();
  };

  function getStorageTweets() {
    return JSON.parse(localStorage.getItem("same_tweets")) || [];
  }

  function setStorageTweets(tweets) {
    localStorage.setItem("same_tweets", JSON.stringify(tweets));
  }

  function handleInput() {
    const inputVal = document.getElementById("tweetInput").value;
    localStorage.setItem("draft_tweet", inputVal);
    updateCharCount(inputVal);
  }

  function loadTweets() {
    const timeline = document.getElementById("timeline");
    const keyword = document.getElementById("searchInput").value.toLowerCase().trim();
    const listViewArea = document.getElementById("listViewArea");
    const actionBar = document.getElementById("timelineActionBar");
    
    const allTweets = getStorageTweets();
    let tweets = [...allTweets];

    document.getElementById("tweetTotalCount").innerText = `(全 ${allTweets.length.toLocaleString()} 件のつぶやき)`;

    if (currentViewMode === 'tag' || currentViewMode === 'month') {
      listViewArea.style.display = "flex";
      if (currentViewMode === 'tag') {
        renderTagList(allTweets);
        if (!selectedTag) {
          actionBar.style.display = "none";
          timeline.innerHTML = `<div class="select-prompt">上の一覧からハッシュタグを選択してください</div>`;
          return;
        }
      }
      if (currentViewMode === 'month') {
        renderMonthList(allTweets);
        if (!selectedMonth) {
          actionBar.style.display = "none";
          timeline.innerHTML = `<div class="select-prompt">上の一覧から月を選択してください</div>`;
          return;
        }
      }
    } else {
      listViewArea.style.display = "none";
    }

    actionBar.style.display = "flex";

    if (currentViewMode === 'like') tweets = tweets.filter(t => t.like);
    if (currentViewMode === 'tag' && selectedTag) {
      const escapedTag = selectedTag.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
      const tagRegex = new RegExp(`(${escapedTag})(?=\\s|$|<|（|\\()`, 'i');
      tweets = tweets.filter(t => tagRegex.test(t.text));
    }
    if (currentViewMode === 'month' && selectedMonth) tweets = tweets.filter(t => t.date && t.date.startsWith(selectedMonth));
    if (keyword) tweets = tweets.filter(t => t.text.toLowerCase().includes(keyword));

    tweets.sort((a, b) => {
      if (sortOrder === 'asc') {
        return a.date > b.date ? 1 : -1;
      } else {
        return a.date < b.date ? 1 : -1;
      }
    });

    timeline.innerHTML = "";
    document.getElementById("selectAll").checked = false;

    if (tweets.length === 0) {
      timeline.innerHTML = `<div class="no-tweet">つぶやきが見つかりませんでした。</div>`;
      return;
    }

    tweets.forEach(tweet => {
      const tweetEl = document.createElement("article");
      tweetEl.id = `tweet-item-${tweet.id}`;
      
      const parentTweet = tweet.parentId ? allTweets.find(t => t.id === tweet.parentId) : null;
      const isRealReply = parentTweet && (new Date(parentTweet.date) < new Date(tweet.date));
      tweetEl.className = `tweet ${isRealReply ? 'is-reply' : ''}`;
      
      let safeText = escapeHTML(tweet.text);
      safeText = linkify(safeText);
      safeText = hashtagify(safeText);

      let conversationHtml = "";
      if (isRealReply) {
        const parentChain = getFullConversationChain(tweet, allTweets);
        if (parentChain.length > 0) {
          const chainNodesHtml = parentChain.map(p => `
            <div class="parent-preview-node">
              <div class="parent-preview-date">${currentViewMode === 'all' ? '<a href="#tweet-item-' + p.id + '" title="元のつぶやきにジャンプ">' + displayFormattedDate(p.date) + '</a>': displayFormattedDate(p.date)}</div>
              <p class="parent-preview-text">${escapeHTML(p.text)}</p>
            </div>
          `).join('');

          conversationHtml = `
            <div class="conversation-thread-box" id="conversation-thread-${tweet.id}" aria-label="過去の会話ツリー">
              ${chainNodesHtml}
            </div>
          `;
        }
      }

      tweetEl.innerHTML = `
        <div class="tweet-checkbox-wrapper">
          <input type="checkbox" class="tweet-select" data-id="${tweet.id}" onchange="checkSelectStatus()" aria-label="${displayFormattedDate(tweet.date)} のつぶやきを選択">
        </div>
        <div class="tweet-main">
          <div class="tweet-header">
            <span><a href="#tweet-item-${tweet.id}">${displayFormattedDate(tweet.date)}</a>${isRealReply ? ' <span class="reply-badge" aria-label="返信つぶやき">◀ Reply</span>' : ''}</span>
            ${isRealReply ? `<button class="show-parent-btn" id="show-parent-btn-${tweet.id}" onclick="toggleConversationTree('${tweet.id}')" aria-expanded="false" aria-controls="conversation-thread-${tweet.id}"><span aria-hidden="true">💬 </span>会話をすべて表示</button>` : ''}
          </div>
          
          ${conversationHtml}

          <div class="tweet-body-container collapsed" id="body-${tweet.id}">
            <p class="tweet-text" id="text-${tweet.id}">${safeText}</p>
          </div>
          <button class="more-btn" id="btn-${tweet.id}" onclick="toggleExpand('${tweet.id}')" style="display: none;" aria-controls="body-${tweet.id}">もっと見る</button>
          
          <div class="tweet-footer">
            <button id="like-btn-${tweet.id}" class="action-btn like-btn ${tweet.like ? 'active' : ''}" onclick="toggleLike('${tweet.id}')" aria-pressed="${tweet.like}">
              <span aria-hidden="true">${tweet.like ? '♥' : '♡'}</span> いいね
            </button>
            <button class="action-btn reply-btn" onclick="openInlineReply('${tweet.id}')"><span aria-hidden="true">💬 </span>返信</button>
            <button class="action-btn edit-btn" onclick="openInlineEdit('${tweet.id}')"><span aria-hidden="true">📝 </span>編集</button>
            <button class="action-btn delete-btn" onclick="deleteTweet('${tweet.id}')"><span aria-hidden="true">× </span>削除</button>
          </div>

          <div id="inline-form-container-${tweet.id}"></div>
        </div>`;
      timeline.appendChild(tweetEl);

      const textEl = document.getElementById(`text-${tweet.id}`);
      const bodyContainer = document.getElementById(`body-${tweet.id}`);
      
      if (textEl) {
        if (tweet.text.split('\n').length > 5 || textEl.scrollHeight > 144) { 
          const btn = document.getElementById(`btn-${tweet.id}`);
          if (btn) {
            btn.style.display = "block";
            btn.innerText = "もっと見る";
          }
        } else {
          bodyContainer.classList.remove("collapsed");
        }
      }
    });
  }

  function loadTweetsWithScroll() {
    const currentScrollY = window.scrollY;
    loadTweets();
    window.scrollTo(0, currentScrollY);
  }

  function openInlineForm(id, title, placeholder, initialText, submitCallbackName) {
    closeAllInlineForms();
    const container = document.getElementById(`inline-form-container-${id}`);
    if (!container) return;

    container.innerHTML = `
      <div class="inline-form-area" role="form" aria-label="${title}">
        <div class="inline-form-title">${title}</div>
        <textarea id="inline-textarea-${id}" placeholder="${placeholder}" oninput="handleInlineInput('${id}')" aria-label="入力欄">${initialText}</textarea>
        <div class="inline-form-footer">
          <button class="btn btn-sub btn-mini" onclick="closeAllInlineForms()">キャンセル</button>
          <button id="inline-btn-${id}" class="btn btn-primary btn-mini" onclick="${submitCallbackName}('${id}')" ${initialText ? '' : 'disabled'}>保存</button>
        </div>
      </div>
    `;
    const textarea = document.getElementById(`inline-textarea-${id}`);
    textarea.focus();
    const len = textarea.value.length;
    textarea.setSelectionRange(len, len);
  }

  function toggleSort() {
    sortOrder = document.getElementById("sortOrder").value;
    loadTweets();
  }

  function updateCharCount(text) {
    const len = text.length;
    const countEl = document.getElementById("charCount");
    countEl.innerText = `${len.toLocaleString()} / ${MAX_CHARS.toLocaleString()}`;
    countEl.classList.toggle("over", len > MAX_CHARS);
    document.getElementById("postBtn").disabled = (text.trim().length === 0 || len > MAX_CHARS);
  }

  function displayFormattedDate(isoString) {
    if (!isoString) return "";
    const d = new Date(isoString);
    if (isNaN(d.getTime())) return isoString; 
    return dateFormat.format(d);
  }

  function switchTab(mode) {
    currentViewMode = mode;
    ['All', 'Like', 'Tag', 'Month'].forEach(t => {
      document.getElementById(`tab${t}`).setAttribute("aria-selected", t.toLowerCase() === mode);
    });

    if (mode !== 'tag') selectedTag = null;
    if (mode !== 'month') selectedMonth = null;
    loadTweets();
  }

  function postTweet() {
    const input = document.getElementById("tweetInput");
    const text = input.value.trim();
    if (!text || input.value.length > MAX_CHARS) return;

    let tweets = getStorageTweets();
    
    tweets.unshift({
      id: crypto.randomUUID(),
      date: new Date().toISOString(),
      text: text,
      like: false,
      parentId: null
    });

    setStorageTweets(tweets);
    localStorage.removeItem("draft_tweet");
    input.value = "";
    handleInput();
    switchTab('all');
    input.focus();
  }

  function openInlineReply(id) {
    openInlineForm(id, "💬 このつぶやきに返信", "返信を入力...", "", "submitInlineReply");
  }

  function handleInlineInput(id) {
    const text = document.getElementById(`inline-textarea-${id}`).value.trim();
    document.getElementById(`inline-btn-${id}`).disabled = (text.length === 0);
  }

  function submitInlineReply(parentId) {
    const text = document.getElementById(`inline-textarea-${parentId}`).value.trim();
    if (!text || text.length > MAX_CHARS) return;

    let tweets = getStorageTweets();

    tweets.unshift({
      id: crypto.randomUUID(),
      date: new Date().toISOString(),
      text: text,
      like: false,
      parentId: String(parentId)
    });

    setStorageTweets(tweets);
    loadTweets();
  }

  function openInlineEdit(id) {
    const tweet = getStorageTweets().find(t => t.id === String(id));
    if (!tweet) return;
    openInlineForm(id, "📝 つぶやきを修正", "", tweet.text, "submitInlineEdit");
  }

  function submitInlineEdit(id) {
    const text = document.getElementById(`inline-textarea-${id}`).value.trim();
    if (!text || text.length > MAX_CHARS) return;

    let tweets = getStorageTweets();
    tweets = tweets.map(t => {
      if (t.id === String(id)) t.text = text;
      return t;
    });

    setStorageTweets(tweets);
    loadTweetsWithScroll();
  }

  function closeAllInlineForms() {
    document.querySelectorAll('[id^="inline-form-container-"]').forEach(el => el.innerHTML = "");
  }

  function getFullConversationChain(currentTweet, allTweets) {
    const chain = [];
    let current = currentTweet;
    const visitedIds = new Set();

    while (current && current.parentId) {
      if (visitedIds.has(current.parentId)) {
        console.error("無限ループを検知したため停止しました:", current.parentId);
        break;
      }
      visitedIds.add(current.id);

      const parent = allTweets.find(t => t.id === current.parentId);
      if (parent) {
        chain.unshift(parent);
        current = parent;
      } else {
        break;
      }
    }
    return chain;
  }

  function toggleConversationTree(id) {
    const el = document.getElementById(`conversation-thread-${id}`);
    const btn = document.getElementById(`show-parent-btn-${id}`);
    if (!el) return;

    const isHidden = el.style.display === "none" || el.style.display === "";
    el.style.display = isHidden ? "block" : "none";
    btn.innerText = isHidden ? "💬 会話をたたむ" : "💬 会話をすべて表示";
    btn.setAttribute("aria-expanded", isHidden);
  }

  function renderTagList(allTweets) {
    const listViewArea = document.getElementById("listViewArea");
    const counts = {}; 
    
    allTweets.forEach(t => {
      const matches = t.text.matchAll(/(?:^|\s)(#[^\s#<（(]+)/g);
      const uniqueTagsInTweet = new Set();
      
      for (const match of matches) {
        const originalTag = match[1];
        const lowerTag = originalTag.toLowerCase();
        
        if (!uniqueTagsInTweet.has(lowerTag)) {
          uniqueTagsInTweet.add(lowerTag);
          
          if (!counts[lowerTag]) {
            counts[lowerTag] = {
              count: 0,
              display: originalTag
            };
          }
          counts[lowerTag].count++;
        }
      }
    });
    
    const keys = Object.keys(counts);
    if (keys.length === 0) {
      listViewArea.innerHTML = `<div class="list-view-empty">タグがありません。</div>`;
      return;
    }
    
    listViewArea.innerHTML = keys.map(lowerKey => {
      const tagInfo = counts[lowerKey];
      const isPressed = selectedTag?.toLowerCase() === lowerKey; 
      return `<button class="list-item-chip" aria-pressed="${isPressed}" onclick="selectTagFromChip('${lowerKey}')">${tagInfo.display} (${tagInfo.count})</button>`;
    }).join('');
  }

  function selectTagFromChip(tag) {
    selectedTag = tag;
    loadTweets();
  }

  function renderMonthList(allTweets) {
    const listViewArea = document.getElementById("listViewArea");
    const counts = {};
    allTweets.forEach(t => {
      if (t.date) {
        const m = t.date.substring(0, 7);
        counts[m] = (counts[m] || 0) + 1;
      }
    });
    
    const sorted = Object.keys(counts).sort((a, b) => b.localeCompare(a));
    if (sorted.length === 0) {
      listViewArea.innerHTML = `<div class="list-view-empty">データがありません。</div>`;
      return;
    }
    
    let html = `<select class="sort-select month-select" onchange="selectedMonth=this.value; loadTweets()" aria-label="表示する月を選択">`;
    html += `<option value="">月を選択してください</option>`;
    
    sorted.forEach(m => {
      const isSelected = selectedMonth === m ? 'selected' : '';
      const [year, month] = m.split('-');
      html += `<option value="${m}" ${isSelected}>${year}/${month} (${counts[m]}件)</option>`;
    });

    html += `</select>`;
    
    listViewArea.innerHTML = html;
  }

  function linkify(t) {
    const urlRegex = /(https?:\/\/[^\s<"\'）\)]+)/g;
    return t.replace(urlRegex, url => {
      let cleanUrl = url;
      if (cleanUrl.endsWith('&quot;')) cleanUrl = cleanUrl.substring(0, cleanUrl.length - 6);
      return `<a href="${cleanUrl}" target="_blank" rel="noopener noreferrer">${cleanUrl}</a>`;
    });
  }

  function hashtagify(t) {
    return t.replace(/(^|\s)(#[^\s#<（(]+)/g, (match, space, tag) => {
      return `${space}<a class="hashtag" tabindex="0" onclick="jumpToHashtag('${tag}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();jumpToHashtag('${tag}')}">${tag}</a>`;
    });
  }
  
  function jumpToHashtag(tag) {
    selectedTag = tag;
    switchTab('tag');
  }

  function toggleLike(id) {
    let tweets = getStorageTweets();
    let targetTweet = tweets.find(t => t.id === String(id));
    if (!targetTweet) return;

    targetTweet.like = !targetTweet.like;
    setStorageTweets(tweets);
    
    const likeBtn = document.getElementById(`like-btn-${id}`);
    if (likeBtn) {
      likeBtn.classList.toggle('active', targetTweet.like);
      likeBtn.setAttribute("aria-pressed", targetTweet.like);
      likeBtn.innerHTML = `<span aria-hidden="true">${targetTweet.like ? '♥' : '♡'}</span> いいね`;
    }
  }

  function deleteTweet(id) {
    if (!confirm("このつぶやきを削除しますか？")) return;
    const nid = String(id);
    setStorageTweets(getStorageTweets().filter(t => t.id !== nid));
    loadTweetsWithScroll();
  }

  function toggleExpand(id) {
    const c = document.getElementById(`body-${id}`);
    const b = document.getElementById(`btn-${id}`);
    const isCol = c.classList.contains("collapsed");
    c.className = `tweet-body-container ${isCol ? 'expanded' : 'collapsed'}`;
    b.innerText = isCol ? "たたむ" : "もっと見る";
  }

  function toggleSelectAll() {
    document.querySelectorAll(".tweet-select").forEach(cb => cb.checked = document.getElementById("selectAll").checked);
    checkSelectStatus();
  }

  function checkSelectStatus() {
    const t = document.querySelectorAll(".tweet-select").length;
    const c = document.querySelectorAll(".tweet-select:checked").length;
    const deleteBtn = document.querySelector(".btn-delete-selected");
    
    document.getElementById("selectAll").checked = (t === c && t > 0);
    
    if (deleteBtn) {
      deleteBtn.disabled = (c === 0); 
    }
  }

  function deleteSelected() {
    const checked = document.querySelectorAll(".tweet-select:checked");
    if (checked.length === 0 || !confirm(`選択された ${checked.length} 件を削除しますか？`)) return;
    const ids = Array.from(checked).map(cb => String(cb.getAttribute("data-id")));
    setStorageTweets(getStorageTweets().filter(t => !ids.includes(t.id)));
    loadTweetsWithScroll();
  }

  function exportJSON() {
    const tweets = getStorageTweets();
    if (tweets.length === 0) return alert("エクスポートするデータがありません。");
    
    const jsonStr = JSON.stringify(tweets, null, 2);
    const blob = new Blob([jsonStr], { type: "application/json;charset=utf-8;" });
    const link = document.createElement("a");
    const dateStr = new Date().toLocaleDateString('sv-SE');

    link.href = URL.createObjectURL(blob);
    link.setAttribute("download", `tweets_export_${dateStr}.json`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }

  function importJSON(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(evt) {
      try {
        const importedTweets = JSON.parse(evt.target.result);
        if (!Array.isArray(importedTweets)) throw new Error();

        let currentTweets = getStorageTweets();
        let addedCount = 0;

        importedTweets.forEach(imp => {
          const isDuplicate = currentTweets.some(c => c.id === imp.id);
          if (!isDuplicate) {
            currentTweets.push(imp);
            addedCount++;
          }
        });
        
        currentTweets.sort((a, b) => b.date.localeCompare(a.date));
        setStorageTweets(currentTweets);
        alert(`インポートが完了しました。\n新たに ${addedCount} 件のデータを統合しました。`);
        loadTweets();
      } catch (err) {
        alert("有効なJSONファイルではありません。エクスポートしたファイルを指定してください。");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  function escapeHTML(s) {
    return s.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t));
  }
</script>
